# Sets user-defined palette

palette = "catppuccin_macchiato"

format = """
[](zvm)\
${custom.zvm_normal}\
${custom.zvm_insert}\
${custom.zvm_visual}\
${custom.zvm_replace}\
[](bg:dir fg:zvm)\
$directory\
[](fg:dir bg:git)\
$git_branch\
$git_status\
[](fg:git bg:lve)\
$c\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$scala\
$python\
[](fg:lve bg:env)\
$docker_context\
${custom.docker}\
${custom.python-venv}\
[](fg:env)\
$fill\
[](fg:sys)\
$os\
$hostname\
[](fg:aur bg:sys)\
${custom.combined_updates}\
[](fg:cmd bg:aur)\
$cmd_duration\
[](fg:tim bg:cmd)\
$time\
[](tim)\
[ ]()
$character\
"""

# Disable the blank line at the start of the prompt
add_newline = true

# CMD error symbol
[character]
success_symbol = '[❯](bold green)'
error_symbol = '[](red)'

vimcmd_symbol = '[❮](bold green)'
vimcmd_visual_symbol = '[❮](bold yellow)'
# Vim modes
# vimcmd_symbol = '[❮](bold purple)'

#          ╭──────────────────────────────────────────────────────────╮
#          │                        Left side                         │
#          ╰──────────────────────────────────────────────────────────╯


[custom.zvm_normal]
command = 'echo "[$ZVM_STARSHIP]"'
when = 'test "$ZVM_STARSHIP" = "N"'
style = "bg:zvm fg:#70c96b"
format = '[ ($output )]($style)'

[custom.zvm_insert]
command = 'echo "[$ZVM_STARSHIP]"'
when = 'test "$ZVM_STARSHIP" = "I"'
style = "bg:zvm fg:#4ba8db bold"
format = '[ ($output )]($style)'

[custom.zvm_visual]
command = 'echo "[$ZVM_STARSHIP]"'
when = 'test "$ZVM_STARSHIP" = "V"'
style = "bg:zvm fg:#8c7aed bold"
format = '[ ($output )]($style)'

[custom.zvm_replace]
command = 'echo "[$ZVM_STARSHIP]"'
when = 'test "$ZVM_STARSHIP" = "R"'
style = "bg:zvm fg:#ff4411 bold"
format = '[ ($output )]($style)'

[directory]
style = "bg:dir fg:txt"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = ""
style = "bg:git fg:txt"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:git fg:txt"
format = '[$all_status$ahead_behind ]($style)'

[c]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[java]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[nodejs]
symbol = ""
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[nim]
symbol = "󰆥 "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[rust]
symbol = ""
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[scala]
symbol = " "
style = "bg:lve fg:txt"
format = '[ $symbol ($version) ]($style)'

[python]
symbol = ''
pyenv_version_name = false
style = "bg:lve fg:txt"
detect_folders = ['.venv', 'venv']
format = '[ ${symbol} ${version} ]($style)'

[docker_context]
symbol = " "
style = "bg:env fg:txt"
only_with_files = false
format = '[ $symbol $context ]($style)'

# [custom.docker]
# symbol = " "
# command = "docker ps --format '{{.Names}}'"
# when = "docker ps -q | grep -q ."
# description = "Show Docker container names"
# style = "bg:env fg:txt"
# format = "[ $symbol $output ]($style)"

[custom.docker]
symbol = " "
style = "bg:env fg:txt"
command = "docker ps --format '{{.Names}}' | paste -sd ' ' -"
when = "systemctl is-active --quiet docker"
description = "Show Docker daemon status and running containers"
format = "[ $symbol$output ]($style)"

[custom.python-venv]
command = 'basename "$VIRTUAL_ENV"'
when = 'true'
style = "bg:env fg:txt"
format = '[( $output )]($style)'

# Separate left side from right side
[fill]
symbol = ' '

#          ╭──────────────────────────────────────────────────────────╮
#          │                        Right side                        │
#          ╰──────────────────────────────────────────────────────────╯

[hostname]
ssh_only = true
ssh_symbol = '󰣀 :'
style = "bg:sys fg:txt"
format = '[$hostname]($style)'
disabled = false

[os]
style = "bg:sys fg:txt"
disabled = false               # Disabled by default
format = "[ $symbol ]($style)"

[os.symbols]
Windows = " "
Arch = "\uf303"

